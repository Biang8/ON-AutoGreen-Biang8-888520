name: 'workflows日志自动清理'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  del_workflow:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # 必须要有删除权限

    steps:
      - name: 强制删除 1 天前的所有工作流运行记录
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

        run: |
          # 列出所有 已完成 的运行记录（只拿 ID）
          gh run list --status completed --json id --jq '.[] .id' | while read run_id; do
            echo "🗑️ 删除运行记录：$run_id"
            gh run delete "$run_id" --yes
          done

          echo "🎉 清理完成！所有 1 天前的运行记录已全部删除"
